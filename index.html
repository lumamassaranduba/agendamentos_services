<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performa Lu - Agendamento</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Performa LU</h1>
        <p>Se não for pra performar, nem sai de casa.</p>
    </header>

    <main>
        <section class="form-container">
            <h2>Novo Agendamento</h2>
            <form id="agendamentoForm">
                
        
                <div id="etapa1">
                    <div class="field">
                        <label for="cliente">Nome do Cliente:</label>
                        <input type="text" id="cliente" placeholder="Digite seu nome" required>
                    </div>

                    <div class="field">
                        <label for="servico">Serviço:</label>
                        <select id="servico" required></select> 
                    </div>
                    
                    <button type="button" id="btnProximo" class="btn btn-ligth mt-3">Escolher data ➡</button>
                </div>

                <div id="etapa2" style="display: none;">
                    <div class="field">
                        <label for="data">Data do Agendamento:</label>
                        <input type="date" id="data" required>
                    </div>

                    <div class="field">
                        <label for="hora">Horário:</label>
                        <input type="time" id="hora" required>
                    </div>
                    
                    <div class="button-group" style="display: flex; gap: 10px; margin-top: 15px;">
                        <button type="button" id="btnVoltar" class="btn btn-ligth">⬅ Voltar</button>
                        <button type="submit" id="btnFinalizar" class="btn btn-ligth">Finalizar Agendamento ✔</button>
                    </div>
                </div>
                
            </form>
        </section>

   
        <section id="preview" class="preview-card">
            <h3>Resumo do Agendamento</h3>
            <p id="msgPreview">Aguardando dados...</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

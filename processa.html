<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performa Lu - Gerenciar Agendamentos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Performa Lu Painel</h1>
        <p>Gerenciamento Local (LocalStorage)</p>
    </header>

    <main>

        <div id="telaPrincipal">
            <section class="form-container">
                <h2>Importar Agendamento</h2>
                <p>Selecione o arquivo <strong>agendamento.json</strong> para adicionar à lista.</p>
                <div class="field">
                    <input type="file" id="uploadJson" accept=".json">
                </div>
            </section>

            <section class="preview-card" style="margin-top: 20px;">
                <h3>Lista de Agendamentos</h3>
                <ul id="listaAgendamentos" style="list-style: none; padding: 0;">

                </ul>
            </section>
        </div>

        <section id="telaEdicao" class="form-container" style="display: none;">
            <h2>Editar Agendamento</h2>
            <form id="formEdicao">
             
                <input type="hidden" id="editId">

                <div class="field">
                    <label for="editNome">Nome do Cliente:</label>
                    <input type="text" id="editNome" required>
                </div>
                <div class="field">
                    <label for="editData">Data:</label>
                    <input type="date" id="editData" required>
                </div>
                <div class="field">
                    <label for="editHora">Horário:</label>
                    <input type="time" id="editHora" required>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button type="button" id="btnCancelarEdicao" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-success">Salvar Alterações</button>
                </div>
            </form>
        </section>
    </main>

    <script src="processa.js"></script>
</body>
</html>
